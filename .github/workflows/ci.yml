name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (tab-indent + syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check tab indentation (reject leading spaces for indent)
        run: |
          echo "Checking that all .py files use tab indentation..."
          FAIL=0
          while IFS= read -r -d '' pyfile; do
            # Find lines that start with spaces (not tabs) for indentation
            # Exclude blank lines, comments at col 0, and lines inside multi-line strings
            if grep -Pn '^ {4,}' "$pyfile" | head -5; then
              echo "ERROR: $pyfile uses space indentation (should be tabs)"
              FAIL=1
            fi
          done < <(find Python/ -name '*.py' -not -path '*/\.venv/*' -print0)
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Some files use space indentation instead of tabs. Run spaces-to-tabs conversion."
            exit 1
          fi
          echo "All files use tab indentation."

      - name: Check Python syntax
        run: python -m py_compile Python/ue_cli_tool/server.py && echo "Syntax OK"

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: Python/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r Python/requirements-dev.txt
          pip install -e Python/

      - name: Run tests
        run: pytest tests/ -v --tb=short