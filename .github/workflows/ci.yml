name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (encoding + indent + syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check encoding (UTF-8, no BOM, has coding declaration)
        run: |
          echo "=== Encoding checks ==="
          FAIL=0
          while IFS= read -r -d '' pyfile; do
            # Reject UTF-8 BOM (EF BB BF)
            if head -c3 "$pyfile" | xxd -p | grep -q 'efbbbf'; then
              echo "::error file=$pyfile::Has UTF-8 BOM — remove it"
              FAIL=1
            fi
            # Verify file is valid UTF-8
            if ! iconv -f utf-8 -t utf-8 "$pyfile" > /dev/null 2>&1; then
              echo "::error file=$pyfile::Not valid UTF-8 — may contain GBK/Latin-1 bytes"
              FAIL=1
            fi
            # Check for # coding: utf-8 in first 3 lines
            if ! head -3 "$pyfile" | grep -q 'coding.*utf-8'; then
              echo "::warning file=$pyfile::Missing '# coding: utf-8' declaration"
            fi
          done < <(find Python/ -name '*.py' -not -path '*/\.venv/*' -print0)
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "All encoding checks passed."

      - name: Check tab indentation (reject leading spaces)
        run: |
          FAIL=0
          while IFS= read -r -d '' pyfile; do
            if grep -Pn '^ {4,}' "$pyfile" | head -5; then
              echo "::error file=$pyfile::Uses space indentation (should be tabs)"
              FAIL=1
            fi
          done < <(find Python/ -name '*.py' -not -path '*/\.venv/*' -print0)
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "All files use tab indentation."

      - name: Check Python syntax
        run: |
          FAIL=0
          while IFS= read -r -d '' pyfile; do
            if ! python -m py_compile "$pyfile" 2>&1; then
              FAIL=1
            fi
          done < <(find Python/ -name '*.py' -not -path '*/\.venv/*' -print0)
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "All syntax checks passed."

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: Python/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r Python/requirements-dev.txt
          pip install -e Python/

      - name: Run tests
        run: pytest tests/ -v --tb=short